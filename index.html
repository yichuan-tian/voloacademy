
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Volo Academy</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#ffffff;
    color:#000000;
    font-family:-apple-system,BlinkMacSystemFont,
    "SF Pro Display","Helvetica Neue",sans-serif;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
}

.container{
    max-width:1100px;
    padding:40px;
}

.logo{
    font-size:15px;
    letter-spacing:8px;
    color:#86868b;
    margin-bottom:25px;
    opacity:0;
    animation:fadeUp 1s forwards;
}

.title{
    font-size:clamp(60px,8vw,120px);
    font-weight:700;
    line-height:1.05;
    margin-bottom:20px;
    opacity:0;
    animation:fadeUp 1s forwards;
    animation-delay:.3s;
}

.subtitle{
    font-size:clamp(22px,2vw,30px);
    color:#6e6e73;
    line-height:1.5;
    margin-bottom:22px;
    opacity:0;
    animation:fadeUp 1s forwards;
    animation-delay:.6s;
}

.notice{
    font-size:15px;
    color:#a1a1a6;
    margin-bottom:70px;
    opacity:0;
    animation:fadeUp 1s forwards;
    animation-delay:.8s;
}

.countdown{
    display:flex;
    justify-content:center;
    gap:60px;
    flex-wrap:wrap;
    margin-bottom:50px;
    opacity:0;
    animation:fadeUp 1s forwards;
    animation-delay:1s;
}

.time-block{
    min-width:120px;
}

.number{
    font-size:clamp(55px,7vw,110px);
    font-weight:700;
    letter-spacing:-3px;
    line-height:1;
}

.label{
    margin-top:10px;
    color:#86868b;
    font-size:14px;
    letter-spacing:2px;
}

.launch{
    font-size:22px;
    color:#86868b;
    opacity:0;
    animation:fadeUp 1s forwards;
    animation-delay:1.2s;
}

@keyframes fadeUp{

    from{
        opacity:0;
        transform:translateY(25px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }

}

</style>
</head>

<body>

<div class="container">

    <div class="logo">
        VOLO ACADEMY
    </div>

    <div class="title">
        Learn Without Limits.
    </div>

    <div class="subtitle">
        The world's free learning resources,<br>
        organized into one place.
    </div>

    <div class="notice">
        Launch has been slightly delayed as we continue expanding course content to provide a better learning experience.
    </div>

    <div class="countdown">

        <div class="time-block">
            <div class="number" id="days">0</div>
            <div class="label">DAYS</div>
        </div>

        <div class="time-block">
            <div class="number" id="hours">0</div>
            <div class="label">HOURS</div>
        </div>

        <div class="time-block">
            <div class="number" id="minutes">0</div>
            <div class="label">MINUTES</div>
        </div>

        <div class="time-block">
            <div class="number" id="seconds">0</div>
            <div class="label">SECONDS</div>
        </div>

    </div>

    <div class="launch">
        Launching July 15, 2026
    </div>

</div>

<script>

const launchDate = new Date(2026, 6, 15, 0, 0, 0);

function updateCountdown(){

    const now = new Date();
    const diff = launchDate - now;

    if(diff <= 0){

        document.getElementById("days").textContent = 0;
        document.getElementById("hours").textContent = "00";
        document.getElementById("minutes").textContent = "00";
        document.getElementById("seconds").textContent = "00";

        return;
    }

    const days = Math.floor(diff / (1000 * 60 * 60 * 24));

    const hours = Math.floor(
        (diff % (1000 * 60 * 60 * 24))
        / (1000 * 60 * 60)
    );

    const minutes = Math.floor(
        (diff % (1000 * 60 * 60))
        / (1000 * 60)
    );

    const seconds = Math.floor(
        (diff % (1000 * 60))
        / 1000
    );

    document.getElementById("days").textContent = days;
    document.getElementById("hours").textContent = String(hours).padStart(2,"0");
    document.getElementById("minutes").textContent = String(minutes).padStart(2,"0");
    document.getElementById("seconds").textContent = String(seconds).padStart(2,"0");

}

updateCountdown();

setInterval(updateCountdown,1000);

</script>

</body>
</html>
